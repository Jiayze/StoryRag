name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Compile
        run: python -m compileall app.py app_services.py build_db.py build_desktop_exe.py core desktop_app knowledge_base llm preprocessing qa retrieval run_desktop.py

      - name: Tests
        run: python -m pytest
